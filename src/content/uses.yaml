        Primarily for fitness tracking, notifications, and Apple Pay.
    - title: HARPOON RGB Pro + Anker 2.4G Wireless Vertical
      sub: Mice
      description: >
        HARPOON wired for desktop; Anker vertical mouse for ergonomic
