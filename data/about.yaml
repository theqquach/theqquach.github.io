bio:
  - >
    Hi — I'm Thê. I'm a student at the University of British Columbia
    completing a Combined Major in Statistics & Economics
    graduating in 2026.
  - >
    I'm passionate about using a data-driven approach to explore
    relationships, answer questions, and provide meaningful recommendations.
    I'm most experienced working with financial data, but I'm always excited
    to learn about new domains — I believe in lifelong learning.
  - >
    My interests span financial economics, political economy, environmental
    economics, and quantitative methods. I enjoy problems at the intersection
    of rigorous statistical thinking and real-world impact. I love analyzing social issues and 
    politics from a cultural lens.
  - >
    Outside academics I'm involved in the Royal Canadian Sea Cadet program, math, statistics and economics tutoring, and various clubs. Feel free to reach
    out about projects, opportunities, or anything at the intersection of
    data and economics.

